<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script>
// Single-page app routing for GitHub Pages
// Redirects all 404s to index.html while preserving the path
// pathSegmentsToKeep = 1 for GitHub Pages (keeps repo name segment)
var isGH = location.hostname.indexOf('github.io') !== -1;
var pathSegmentsToKeep = isGH ? 1 : 0;
var l = window.location;
l.replace(
  l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
  l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
  l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
  (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
  l.hash
);
</script>
</head>
<body>
</body>
</html>
