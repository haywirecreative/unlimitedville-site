/* ═══════════════════════════════════════
   ADDRESS INPUT w/ GOOGLE PLACES AUTOCOMPLETE
   Falls back to plain input if API key not set
   ═══════════════════════════════════════ */
function AddressInput({ value, onChange, onSubmit, inputStyle }) {
  const containerRef = useRef(null);
  const cbRef = useRef({ onChange, onSubmit });
  cbRef.current = { onChange, onSubmit };
  const [useFallback, setUseFallback] = useState(false);

  useEffect(() => {
    const container = containerRef.current;
    if (!container) return;
    let iv, mounted = true;

    async function attach() {
      try {
        await google.maps.importLibrary("places");
        if (!mounted) return;
        const pac = new google.maps.places.PlaceAutocompleteElement({
          componentRestrictions: { country: "us" },
          types: ["address"]
        });
        // Style the inner input to match our design
        pac.style.cssText = "width:100%;";
        pac.addEventListener("gmp-select", async (e) => {
          const place = e.placePrediction.toPlace();
          await place.fetchFields({ fields: ["formattedAddress"] });
          const addr = place.formattedAddress || "";
          cbRef.current.onChange(addr);
          setTimeout(() => cbRef.current.onSubmit && cbRef.current.onSubmit(addr), 100);
        });
        container.innerHTML = "";
        container.appendChild(pac);
      } catch(e) {
        if (mounted) setUseFallback(true);
      }
    }

    if (window.google && window.google.maps) { attach(); }
    else {
      let tries = 0;
      iv = setInterval(() => {
        if (window.google && window.google.maps) { clearInterval(iv); attach(); }
        else if (++tries > 40) { clearInterval(iv); if (mounted) setUseFallback(true); }
      }, 250);
    }
    return () => { mounted = false; iv && clearInterval(iv); };
  }, []);

  if (useFallback) {
    return (
      <input type="text" placeholder="Enter your address..." defaultValue={value}
        onChange={e => cbRef.current.onChange(e.target.value)}
        onKeyDown={e => { if(e.key==="Enter" && e.target.value.length>=5) cbRef.current.onSubmit && cbRef.current.onSubmit(e.target.value); }}
        style={inputStyle} />
    );
  }

  return <div ref={containerRef} style={{ flex:1 }}>
    <input type="text" placeholder="Enter your address..." defaultValue={value}
      onChange={e => cbRef.current.onChange(e.target.value)}
      onKeyDown={e => { if(e.key==="Enter" && e.target.value.length>=5) cbRef.current.onSubmit && cbRef.current.onSubmit(e.target.value); }}
      style={inputStyle} />
  </div>;
}

/* ═══════════════════════════════════════
   APP ROUTER
   ═══════════════════════════════════════ */
function App() {
  const [page, setPage] = useState("home");
  const [cart, setCart] = useState(null);
  const [address, setAddress] = useState("");
  const [addressChecked, setAddressChecked] = useState(false);
  const [addressResult, setAddressResult] = useState(null);

  function navigate(p) {
    setPage(p);
    window.scrollTo({ top:0, behavior:"instant" });
  }

  const ctx = { page, navigate, cart, setCart, address, setAddress, addressChecked, setAddressChecked, addressResult, setAddressResult };

  function renderPage() {
    switch(page) {
      case "home": return <HomePage />;
      case "plans": return <PlansPage />;
      case "cart": return <CartPage />;
      case "checkout": return <CheckoutPage />;
      case "reviews": return <PlaceholderPage title="Reviews" subtitle="213+ verified member reviews. Read what real members are saying about Unlimitedville." />;
      case "blog": return <PlaceholderPage title="Blog" subtitle="Guides, tips, and news about wireless internet, rural connectivity, and life off the grid." />;
      case "support": return <PlaceholderPage title="Support & FAQs" subtitle="Get help with your service, find answers, or talk to a real person at 888.422.2907." />;
      case "solutions": return <PlaceholderPage title="Solutions" subtitle="Internet solutions for every lifestyle. Rural homes, RV travel, businesses, and more." />;
      case "login": return <PlaceholderPage title="Member Login" subtitle="Access your account, manage your plan, and track your usage." />;
      default:
        if (page.startsWith("uc-")) {
          const uc = USE_CASES.find(u => "uc-"+u.slug === page);
          return <PlaceholderPage title={uc ? `Internet for ${uc.label}` : "Use Case"} subtitle={uc?.desc} />;
        }
        return <PlaceholderPage title="Page Not Found" />;
    }
  }

  return (
    <AppContext.Provider value={ctx}>
      <Nav />
      {renderPage()}
      <Footer />
      <StickyBar />
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
