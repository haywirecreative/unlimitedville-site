/* ═══════════════════════════════════════
   ADDRESS INPUT w/ GOOGLE PLACES AUTOCOMPLETE
   Uses classic Autocomplete API on a plain <input> so styling is
   100% under our control -- no shadow DOM, no element replacement.
   ═══════════════════════════════════════ */
function AddressInput({ value, onChange, onSubmit, inputStyle, light }) {
  const inputRef = useRef(null);
  const cbRef = useRef({ onChange, onSubmit });
  cbRef.current = { onChange, onSubmit };

  useEffect(() => {
    let mounted = true, iv, pacObserver;
    const themeClass = light ? "pac-theme-light" : "pac-theme-dark";

    async function attach() {
      try {
        await google.maps.importLibrary("places");
        if (!mounted || !inputRef.current) return;
        const ac = new google.maps.places.Autocomplete(inputRef.current, {
          componentRestrictions: { country: "us" },
          types: ["address"],
          fields: ["formatted_address"]
        });
        // Tag the pac-container dropdown with our theme class when Google appends it to body
        pacObserver = new MutationObserver((mutations) => {
          for (const m of mutations) {
            for (const node of m.addedNodes) {
              if (node.classList && node.classList.contains("pac-container")) {
                node.classList.add(themeClass);
              }
            }
          }
        });
        pacObserver.observe(document.body, { childList: true });
        ac.addListener("place_changed", () => {
          if (!mounted || !inputRef.current) return;
          const place = ac.getPlace();
          const addr = place.formatted_address || inputRef.current.value;
          cbRef.current.onChange(addr);
          setTimeout(() => cbRef.current.onSubmit && cbRef.current.onSubmit(addr), 100);
        });
      } catch(e) { /* plain input still works */ }
    }

    if (window.google && window.google.maps) { attach(); }
    else {
      let tries = 0;
      iv = setInterval(() => {
        if (window.google && window.google.maps) { clearInterval(iv); attach(); }
        else if (++tries > 40) { clearInterval(iv); }
      }, 250);
    }
    return () => { mounted = false; iv && clearInterval(iv); pacObserver && pacObserver.disconnect(); };
  }, []);

  return (
    <input ref={inputRef} type="text" placeholder="Enter your address..." defaultValue={value}
      onChange={e => cbRef.current.onChange(e.target.value)}
      onKeyDown={e => { if(e.key==="Enter" && e.target.value.length>=5) cbRef.current.onSubmit && cbRef.current.onSubmit(e.target.value); }}
      style={inputStyle} />
  );
}

function useSEO(title, description) {
  useEffect(() => {
    const prev = document.title;
    document.title = title;
    let meta = document.querySelector('meta[name="description"]');
    const prevDesc = meta ? meta.content : "";
    if (!meta) { meta = document.createElement("meta"); meta.name = "description"; document.head.appendChild(meta); }
    meta.content = description;
    return () => { document.title = prev; if (meta) meta.content = prevDesc; };
  }, [title, description]);
}

    script.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": post.title,
      "description": post.excerpt,
      "image": post.heroImg,
      "datePublished": post.date,
      "dateModified": post.date,
      "author": { "@type": "Organization", "name": "Unlimitedville", "url": "https://unlimitedville.com" },
      "publisher": { "@type": "Organization", "name": "Unlimitedville", "logo": { "@type": "ImageObject", "url": "https://unlimitedville.com/images/logo.png" } },
      "mainEntityOfPage": { "@type": "WebPage", "@id": "https://unlimitedville.com/blog/" + post.slug }
    });
    document.head.appendChild(script);
    return () => { const el = document.getElementById("article-schema"); if (el) el.remove(); };
  }, [post.slug]);

  function fmtDate(d) {
    const dt = new Date(d + "T00:00:00");

function App() {
  const [page, setPage] = useState(getHashPage);
  const [cart, setCart] = useState(null);
  const [address, setAddress] = useState("");
  const [addressChecked, setAddressChecked] = useState(false);
  const [addressResult, setAddressResult] = useState(null);
  const [selectedPlan, setSelectedPlan] = useState(null);

  // Sync hash -> state (back/forward buttons)
  useEffect(() => {
    const onHash = () => { const p = getHashPage(); setPage(p); window.scrollTo({top:0,behavior:"instant"}); };
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  function navigate(p) {
    window.location.hash = "#/" + p;
    setPage(p);
    window.scrollTo({ top:0, behavior:"instant" });
  }

  const ctx = { page, navigate, cart, setCart, address, setAddress, addressChecked, setAddressChecked, addressResult, setAddressResult, selectedPlan, setSelectedPlan };

  function renderPage() {
    switch(page) {
      case "home": return <HomePage />;
      case "plans": return <PlansPage />;
      case "cart": return <CartPage />;
      case "checkout": return <CheckoutPage />;
      case "reviews": return <ReviewsPage />;
      case "blog": return <BlogPage />;
      case "support": return <SupportPage />;
      case "solutions": return <SolutionsHub />;
      case "login": return <LoginPage />;
      case "account": return <MyAccountPage />;
      case "starlink-compare": return <VsStarlinkPage />;
      default:
        /* Blog post routing -- blog/slug */
        if (page.startsWith("blog/")) {
          const slug = page.replace("blog/","");
          const post = BLOG_POSTS.find(p => p.slug === slug);
          if (post) return <BlogPostPage key={slug} post={post} />;
        }
        /* Dynamic solution page routing -- driven by SOLUTION_PAGES */
        if (SOLUTION_PAGES[page]) {
          return <SolutionPage key={page} config={SOLUTION_PAGES[page]} />;
        }
        /* Legacy uc-* slug support for bookmarks/SEO */
        if (page.startsWith("uc-")) {
          const legacy = { "uc-rural":"rural", "uc-rv":"rv", "uc-trucking":"trucking", "uc-gaming":"gaming", "uc-business":"business", "uc-failover":"failover", "uc-urban":"rural", "uc-transportation":"trucking", "uc-mobile-biz":"business" };
          if (legacy[page] && SOLUTION_PAGES[legacy[page]]) {
            return <SolutionPage key={legacy[page]} config={SOLUTION_PAGES[legacy[page]]} />;
          }
        }
        return <PlaceholderPage title="Page Not Found" />;
    }
  }

  return (
    <AppContext.Provider value={ctx}>
      <Nav />
      <main id="main-content" key={page}>
        {renderPage()}
      </main>
      <Footer />
      <StickyBar />
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
