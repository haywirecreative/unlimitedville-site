<script>
// Set base href for proper relative URL resolution with clean URL routing
// GitHub Pages deploys to /unlimitedville-site/, production to /
(function() {
  var isGH = location.hostname.indexOf('github.io') !== -1;
  var base = document.createElement('base');
  base.href = isGH ? '/unlimitedville-site/' : '/';
  document.head.appendChild(base);
  // SPA redirect handler -- restores clean URL from 404.html redirect
  var l = window.location;
  if (l.search[1] === '/') {
    var decoded = l.search.slice(1).split('&').map(function(s) { return s.replace(/~and~/g, '&'); }).join('?');
    window.history.replaceState(null, null, base.href.replace(/\/$/, '') + decoded + l.hash);
  }
})();
</script>

/* ═══════════════════════════════════════
   ADDRESS INPUT w/ GOOGLE PLACES AUTOCOMPLETE
   Uses classic Autocomplete API on a plain <input> so styling is
   100% under our control -- no shadow DOM, no element replacement.
   ═══════════════════════════════════════ */
function AddressInput({ value, onChange, onSubmit, inputStyle, light }) {
  const inputRef = useRef(null);
  const cbRef = useRef({ onChange, onSubmit });
  cbRef.current = { onChange, onSubmit };

  useEffect(() => {
    let mounted = true, iv, pacObserver;
    const themeClass = light ? "pac-theme-light" : "pac-theme-dark";

    async function attach() {
      try {
        await google.maps.importLibrary("places");
        if (!mounted || !inputRef.current) return;
        const ac = new google.maps.places.Autocomplete(inputRef.current, {
          componentRestrictions: { country: "us" },
          types: ["address"],
          fields: ["formatted_address"]
        });
        // Tag the pac-container dropdown with our theme class when Google appends it to body
        pacObserver = new MutationObserver((mutations) => {
          for (const m of mutations) {
            for (const node of m.addedNodes) {
              if (node.classList && node.classList.contains("pac-container")) {
                node.classList.add(themeClass);
              }
            }
          }
        });
        pacObserver.observe(document.body, { childList: true });
        ac.addListener("place_changed", () => {
          if (!mounted || !inputRef.current) return;
          const place = ac.getPlace();
          const addr = place.formatted_address || inputRef.current.value;
          cbRef.current.onChange(addr);
          setTimeout(() => cbRef.current.onSubmit && cbRef.current.onSubmit(addr), 100);
        });
      } catch(e) { /* plain input still works */ }
    }

    if (window.google && window.google.maps) { attach(); }
    else {
      let tries = 0;
      iv = setInterval(() => {
        if (window.google && window.google.maps) { clearInterval(iv); attach(); }
        else if (++tries > 40) { clearInterval(iv); }
      }, 250);
    }
    return () => { mounted = false; iv && clearInterval(iv); pacObserver && pacObserver.disconnect(); };
  }, []);

  return (
    <input ref={inputRef} type="text" placeholder="Enter your address..." defaultValue={value}
      onChange={e => cbRef.current.onChange(e.target.value)}
      onKeyDown={e => { if(e.key==="Enter" && e.target.value.length>=5) cbRef.current.onSubmit && cbRef.current.onSubmit(e.target.value); }}
      style={inputStyle} />
  );
}

function useSEO(title, description, path, opts) {
  const noindex = opts && opts.noindex;
  useEffect(() => {
    const prev = document.title;
    document.title = title;
    // Meta description
    let meta = document.querySelector('meta[name="description"]');
    const prevDesc = meta ? meta.content : "";
    if (!meta) { meta = document.createElement("meta"); meta.name = "description"; document.head.appendChild(meta); }
    meta.content = description;
    // OG tags
    const ogTitle = document.querySelector('meta[property="og:title"]');
    const prevOgTitle = ogTitle ? ogTitle.content : "";
    if (ogTitle) ogTitle.content = title;
    const ogDesc = document.querySelector('meta[property="og:description"]');
    const prevOgDesc = ogDesc ? ogDesc.content : "";
    if (ogDesc) ogDesc.content = description;
    // Canonical
    const canonical = document.querySelector('link[rel="canonical"]');
    const prevCanonical = canonical ? canonical.href : "";
    if (canonical && path) canonical.href = "https://unlimitedville.com/" + path;
    // Robots noindex
    let robots = document.querySelector('meta[name="robots"]');
    const prevRobots = robots ? robots.content : "";
    if (noindex) {
      if (!robots) { robots = document.createElement("meta"); robots.name = "robots"; document.head.appendChild(robots); }
      robots.content = "noindex, nofollow";
    } else if (robots) {
      robots.content = "index, follow";
    }
    return () => {
      document.title = prev;
      if (meta) meta.content = prevDesc;
      if (ogTitle) ogTitle.content = prevOgTitle;
      if (ogDesc) ogDesc.content = prevOgDesc;
      if (canonical) canonical.href = prevCanonical;
      if (robots) robots.content = prevRobots;
    };
  }, [title, description, path, noindex]);
}

/* Dynamic schema injection helper */
function useSchema(id, schema) {
  useEffect(() => {
    if (!schema) return;
    const script = document.createElement("script");
    script.type = "application/ld+json"; script.id = id;
    script.textContent = JSON.stringify(schema);
    document.head.appendChild(script);
    return () => { const el = document.getElementById(id); if (el) el.remove(); };
  }, [id, JSON.stringify(schema)]);
}

function BlogPostPage({ post }) {
  const { navigate } = useApp();
  useSEO(post.title + " | Unlimitedville", post.excerpt, "blog/" + post.slug);
  useSchema("blog-article-schema", {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": post.title,
    "description": post.excerpt,
    "author": { "@type": "Organization", "name": post.author || "Unlimitedville" },
    "publisher": { "@type": "Organization", "name": "Unlimitedville", "url": "https://unlimitedville.com/" },
    "datePublished": post.date,
    "dateModified": post.date,
    "mainEntityOfPage": { "@type": "WebPage", "@id": "https://unlimitedville.com/blog/" + post.slug },
    "image": post.heroImg
  });
  useSchema("blog-post-breadcrumb", {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://unlimitedville.com/" },
      { "@type": "ListItem", "position": 2, "name": "Resources", "item": "https://unlimitedville.com/blog" },
      { "@type": "ListItem", "position": 3, "name": post.title, "item": "https://unlimitedville.com/blog/" + post.slug }
    ]
  });

  /* Inject JSON-LD Article schema */
  useEffect(() => {
    const script = document.createElement("script");
    script.type = "application/ld+json";
    script.id = "article-schema";
    script.textContent = JSON.stringify({
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": post.title,
      "description": post.excerpt,
      "image": post.heroImg,
      "datePublished": post.date,
      "dateModified": post.date,
      "author": { "@type": "Organization", "name": "Unlimitedville", "url": "https://unlimitedville.com" },
      "publisher": { "@type": "Organization", "name": "Unlimitedville", "logo": { "@type": "ImageObject", "url": "https://unlimitedville.com/images/logo.png" } },
      "mainEntityOfPage": { "@type": "WebPage", "@id": "https://unlimitedville.com/blog/" + post.slug }
    });
    document.head.appendChild(script);
    return () => { const el = document.getElementById("article-schema"); if (el) el.remove(); };
  }, [post.slug]);

  function fmtDate(d) {
    const dt = new Date(d + "T00:00:00");
    return dt.toLocaleDateString("en-US", { month:"long", day:"numeric", year:"numeric" });
  }

  /* Table of contents from h2 blocks */
  const headings = post.content.filter(b => b.type === "h2");

  /* Related posts: same category, excluding this post */
  const related = BLOG_POSTS.filter(p => p.slug !== post.slug && p.category === post.category).slice(0,2);
  const relatedFallback = related.length < 2 ? BLOG_POSTS.filter(p => p.slug !== post.slug && !related.find(r=>r.slug===p.slug)).slice(0,2-related.length) : [];
  const relatedPosts = [...related, ...relatedFallback];

  return (
    <div className="bg-uv-dark min-h-screen">
      {/* Article hero */}
      <section className="relative overflow-hidden">
        <img src={post.heroImg} alt={post.title} className="w-full h-[360px] object-cover block" />
        <div className="absolute" style={{inset:0, background:"linear-gradient(180deg, rgba(10,10,10,0.2) 0%, rgba(10,10,10,0.95) 85%, rgba(18,18,20,1) 100%)"}} />
        <div className="absolute bottom-0 left-0 right-0" style={{padding:"0 24px 20px"}}>
          <div className="blog-article-header max-w-[720px] mx-auto">
            <button onClick={()=>navigate("blog")} className="inline-flex items-center gap-1.5 bg-black/50 border-0 text-white text-[13px] font-semibold cursor-pointer mb-4 py-2 px-3.5 rounded-full" style={{backdropFilter:"blur(8px)"}}>
              {I.back(14,T.white)} All resources
            </button>
            <span className="inline-block py-[5px] px-3 rounded-md text-uv-green-text text-[11px] font-bold tracking-[0.5px] uppercase mb-3" style={{background:`${T.green}15`}}>{post.category}</span>
            <h1 className="blog-post-title text-[32px] font-black text-white tracking-[-1.0px] leading-[1.15] mb-4">{post.title}</h1>
            <div className="flex items-center gap-4 flex-wrap">
              <span className="flex items-center gap-[5px] text-[13px] text-zinc-400">{I.user(14,T.g500)} {post.author}</span>
              <span className="flex items-center gap-[5px] text-[13px] text-zinc-400">{I.calendar(13,T.g500)} {fmtDate(post.date)}</span>
              <span className="flex items-center gap-[5px] text-[13px] text-zinc-400">{I.clock(13,T.g500)} {post.readTime}</span>
            </div>
          </div>
        </div>
      </section>

      {/* Article body */}
      <article className="blog-article-section" style={{ padding:"0 24px 48px" }}>
        <div className="blog-article-body max-w-[720px] mx-auto">
          {/* Table of contents */}
          {headings.length > 2 && (
            <div className="blog-toc py-5 px-6 rounded-uv-md bg-white/5 mb-9" style={{border:`1px solid ${T.darkBorder}`}}>
              <p className="text-xs font-bold tracking-[2.0px] text-zinc-500 uppercase mb-3">In this article</p>
              <div className="flex flex-col gap-2">
                {headings.map((h,i) => (
                  <a key={i} href={"#section-"+i} onClick={(e)=>{e.preventDefault();document.getElementById("section-"+i)?.scrollIntoView({behavior:"smooth",block:"start"})}} className="text-sm text-zinc-300 no-underline leading-snug flex items-start gap-2">
                    <span className="text-zinc-600 text-xs font-semibold min-w-[18px]">{String(i+1).padStart(2,"0")}</span>
                    {h.text}
                  </a>
                ))}
              </div>
            </div>
          )}

          {/* Content blocks */}
          {post.content.map((block, i) => {
            const sectionIdx = headings.indexOf(block);
            if (block.type === "h2") {
              return <h2 key={i} id={"section-"+sectionIdx} className="blog-h2 text-[22px] font-extrabold text-white tracking-[-0.3px] mt-10 mb-4 leading-tight" style={{scrollMarginTop:100}}>{block.text}</h2>;
            }
            if (block.type === "h3") {
              return <h3 key={i} className="blog-h3 text-lg font-bold text-zinc-100 tracking-[-0.2px] mt-7 mb-3 leading-[1.3]">{block.text}</h3>;
            }
            if (block.type === "p") {
              return <p key={i} className="blog-p text-base text-zinc-300 leading-[1.75] mb-5">{block.text}</p>;
            }
            if (block.type === "callout") {
              return (
                <div key={i} className="py-5 px-6 rounded-uv-md mb-6 mt-2" style={{background:`${T.green}08`, borderLeft:`3px solid ${T.green}`}}>
                  <p className="text-[15px] text-zinc-200 leading-[1.65] m-0">{block.text}</p>
                </div>
              );
            }
            return null;
          })}

          {/* Related solution pages -- internal links for SEO */}
          {post.relatedSolutions && post.relatedSolutions.length > 0 && (
            <div className="mt-10 rounded-2xl bg-white/5" style={{padding:"24px", border:`1px solid ${T.darkBorder}`}}>
              <p className="text-xs font-bold tracking-[2.0px] text-zinc-500 uppercase mb-3.5">Related pages</p>
              <div className="flex flex-col gap-2">
                {post.relatedSolutions.map((sol, i) => (
                  <button key={i} onClick={()=>navigate(sol.slug)} className="flex items-center justify-between py-3 px-4 rounded-uv-sm bg-white/5 text-zinc-200 text-sm font-semibold cursor-pointer text-left" style={{border:`1px solid ${T.darkBorder}`}}>
                    {sol.label} {I.arrow(12,T.greenText)}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Inline CTA */}
          <div className="mt-12 rounded-[18px] overflow-hidden bg-zinc-900" style={{border:`1px solid ${T.darkBorder}`}}>
            <div className="relative w-full h-[140px] overflow-hidden">
              <img src="https://unlimitedville.com/images/hero/rural-interior-room.jpg" alt="Get connected with Unlimitedville" className="w-full h-full object-cover" />
              <div className="absolute" style={{inset:0, background:"linear-gradient(180deg, rgba(10,10,10,0.1) 0%, rgba(10,10,10,0.7) 100%)"}} />
            </div>
            <div className="text-center" style={{padding:"28px 28px 32px"}}>
              <h3 className="text-xl font-extrabold text-white mb-2">Ready to get connected?</h3>
              <p className="text-sm text-zinc-400 leading-relaxed max-w-[400px]" style={{margin:"0 auto 20px"}}>Check your coverage and find the right plan for your address. Every plan includes a 21-day money-back guarantee.</p>
              <button onClick={()=>navigate("plans")} className="btn-primary btn-desktop-auto w-full py-4 px-7 bg-uv-green text-white border-0 rounded-xl text-[15px] font-bold flex items-center justify-center gap-1.5 mx-auto" style={{boxShadow:`0 0 32px ${T.greenGlow}`}}>
                See Plans & Pricing {I.arrow(14)}
              </button>
            </div>
          </div>
        </div>
      </article>

      {/* Related posts */}
      {relatedPosts.length > 0 && (
        <section className="desktop-section py-12 px-5 bg-uv-black" style={{borderTop:`1px solid ${T.darkBorder}`}}>
          <div className="section-inner">
            <p className="text-xs font-bold tracking-[3.0px] text-uv-green-text uppercase mb-2.5 text-center">Keep reading</p>
            <h2 className="text-2xl font-extrabold text-white tracking-[-0.3px] mb-7 text-center">Related articles</h2>
            <div className="blog-related-grid grid gap-5" style={{gridTemplateColumns:"1fr"}}>
              {relatedPosts.map(rp => (
                <button key={rp.slug} onClick={()=>navigate("blog/"+rp.slug)} className="card-hover flex flex-col overflow-hidden rounded-2xl bg-zinc-900 cursor-pointer text-left p-0" style={{border:`1px solid ${T.darkBorder}`}}>
                  <div className="relative w-full overflow-hidden" style={{paddingTop:"50%"}}>
                    <img src={rp.heroImg} alt={rp.title} className="absolute top-0 left-0 w-full h-full object-cover" />
                    <div className="absolute" style={{inset:0, background:"linear-gradient(180deg, transparent 50%, rgba(10,10,10,0.6) 100%)"}} />
                  </div>
                  <div className="flex-1 flex flex-col" style={{padding:"20px 20px 24px"}}>
                    <span className="py-1 px-2.5 rounded-md text-uv-green-text text-[11px] font-semibold mb-2.5" style={{background:`${T.green}10`, alignSelf:"flex-start"}}>{rp.category}</span>
                    <h3 className="text-[17px] font-bold text-white leading-[1.3] mb-2">{rp.title}</h3>
                    <p className="text-[13px] text-zinc-400 leading-normal flex-1">{rp.excerpt}</p>
                    <span className="text-[13px] font-semibold text-uv-green-text flex items-center gap-1 mt-3">Read {I.arrow(10,T.greenText)}</span>
                  </div>
                </button>
              ))}
            </div>
          </div>
        </section>
      )}
    </div>
  );
}

        </div>
      )}
    </div>
  );
}

function getPage() {
  // Support both clean URLs and legacy hash URLs
  const hash = window.location.hash.replace("#/","").replace("#","");
  if (hash) return hash;
  const base = document.querySelector("base");
  const basePath = base ? new URL(base.href).pathname : "/";
  let path = window.location.pathname;
  if (path.startsWith(basePath)) path = path.slice(basePath.length);
  path = path.replace(/^\//, "").replace(/\/$/, "").replace(/^index\.html$/, "");
  return path || "home";
}

function App() {
  const [page, setPage] = useState(getPage);
  const [cart, setCart] = useState(null);
  const [address, setAddress] = useState("");
  const [addressChecked, setAddressChecked] = useState(false);
  const [addressResult, setAddressResult] = useState(null);
  const [selectedPlan, setSelectedPlan] = useState(null);

  // Compute base path once for routing
  const basePath = useMemo(() => {
    const base = document.querySelector("base");
    return base ? new URL(base.href).pathname.replace(/\/$/, "") : "";
  }, []);

  // Sync browser back/forward -> state (supports both popstate and legacy hashchange)
  useEffect(() => {
    const onNav = () => { const p = getPage(); setPage(p); window.scrollTo({top:0,behavior:"instant"}); };
    window.addEventListener("popstate", onNav);
    window.addEventListener("hashchange", onNav);
    // Redirect legacy hash URLs to clean URLs
    if (window.location.hash) {
      const h = window.location.hash.replace("#/","").replace("#","");
      if (h) {
        const cleanPath = h === "home" ? basePath + "/" : basePath + "/" + h;
        window.history.replaceState(null, "", cleanPath);
      }
    }
    return () => { window.removeEventListener("popstate", onNav); window.removeEventListener("hashchange", onNav); };
  }, []);

  function navigate(p) {
    const cleanPath = p === "home" ? basePath + "/" : basePath + "/" + p;
    window.history.pushState(null, "", cleanPath);
    setPage(p);
    window.scrollTo({ top:0, behavior:"instant" });
  }

  const ctx = { page, navigate, cart, setCart, address, setAddress, addressChecked, setAddressChecked, addressResult, setAddressResult, selectedPlan, setSelectedPlan };

  function renderPage() {
    switch(page) {
      case "home": return <HomePage />;
      case "plans": return <PlansPage />;
      case "cart": return <CartPage />;
      case "checkout": return <CheckoutPage />;
      case "reviews": return <ReviewsPage />;
      case "blog": return <BlogPage />;
      case "support": return <SupportPage />;
      case "solutions": return <SolutionsHub />;
      case "login": return <LoginPage />;
      case "account": return <MyAccountPage />;
      case "starlink-compare": return <VsStarlinkPage />;
      case "coverage": return <CoveragePage />;
      default:
        /* Blog post routing -- blog/slug */
        if (page.startsWith("blog/")) {
          const slug = page.replace("blog/","");
          const post = BLOG_POSTS.find(p => p.slug === slug);
          if (post) return <BlogPostPage key={slug} post={post} />;
        }
        /* Dynamic solution page routing -- driven by SOLUTION_PAGES */
        if (SOLUTION_PAGES[page]) {
          return <SolutionPage key={page} config={SOLUTION_PAGES[page]} />;
        }
        /* Legacy uc-* slug support for bookmarks/SEO */
        if (page.startsWith("uc-")) {
          const legacy = { "uc-rural":"rural", "uc-rv":"rv", "uc-trucking":"trucking", "uc-gaming":"gaming", "uc-business":"business", "uc-failover":"failover", "uc-urban":"rural", "uc-transportation":"trucking", "uc-mobile-biz":"business" };
          if (legacy[page] && SOLUTION_PAGES[legacy[page]]) {
            return <SolutionPage key={legacy[page]} config={SOLUTION_PAGES[legacy[page]]} />;
          }
        }
        return <PlaceholderPage title="Page Not Found" />;
    }
  }

  return (
    <AppContext.Provider value={ctx}>
      <Nav />
      <main id="main-content" key={page}>
        {renderPage()}
      </main>
      <Footer />
      <StickyBar />
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
